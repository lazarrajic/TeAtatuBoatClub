<!doctype html>
<html lang="en-NZ">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Te Atatū Boating Club</title>
    <meta
      name="description"
      content="Te Atatū Boating Club — a member-run club in Te Atatū South, Auckland. Boat ramps, hardstand and work bays, plus a members bar, restaurant and function venue overlooking the harbour."
    />

    <!-- Open Graph / social share. TODO: after deploy, swap the two absolute
         URLs below for the live domain so link previews resolve everywhere. -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Te Atatū Boating Club" />
    <meta property="og:title" content="Te Atatū Boating Club" />
    <meta
      property="og:description"
      content="Boat ramps, hardstand and work bays, plus a members bar, restaurant and function venue overlooking the harbour. A member-run club since the 1960s."
    />
    <meta property="og:image" content="/og.jpg" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Te Atatū Boating Club" />
    <meta
      name="twitter:description"
      content="Boat ramps, hardstand and work bays, a members bar, restaurant and function venue overlooking the harbour."
    />
    <meta name="twitter:image" content="/og.jpg" />
    <meta name="theme-color" content="#0b2545" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>

    <!-- Hidden static form so Netlify's build bot detects the "contact" form.
         The React form (src/pages/Contact.jsx) submits to it via fetch.
         Email notifications are OFF by default — submissions collect in the
         Netlify dashboard only; nothing is emailed to the club. -->
    <form name="contact" netlify netlify-honeypot="bot-field" hidden>
      <input type="text" name="name" />
      <input type="email" name="email" />
      <textarea name="message"></textarea>
      <input name="bot-field" />
    </form>
  </body>
</html>
